name: Update Numera Package

on:
  schedule:
    - cron: '0 0 * * 0'   # weekly on Sunday at 00:00
  workflow_dispatch:      # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Make update script executable
        run: chmod +x scripts/update-numera.sh

      - name: Run update script
        run: |
          nix-shell -p nix-prefetch-git curl jq --run ./scripts/update-numera.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.no_changes == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkgs/numara.nix
          git commit -m "chore: auto-update numara to $(grep -oP 'version = "\K[^"]+' pkgs/numara.nix)"
          git push
